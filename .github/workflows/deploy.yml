name: Deploy RPAL IDE

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: praveen-de-silva/rpal-compiler/rpal-ide

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r web/server/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 web/server/app.py --max-line-length=120 --ignore=E501,W503
        continue-on-error: true

      - name: Check for security issues
        run: |
          pip install bandit
          bandit -r web/server/ -f json -o bandit.json
        continue-on-error: true

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

  push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-heroku:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.head_commit.message != '[skip deploy]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Compile interpreter for Linux
        run: |
          sudo apt-get install -y g++
          make
          cp rpal20 compiler/bin/rpal20
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add -f compiler/bin/rpal20
          git commit -m "CI: build fresh Linux binary [skip deploy]" || echo "Binary unchanged"

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          test -n "$HEROKU_API_KEY"
          test -n "$HEROKU_APP_NAME"
          git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/$HEROKU_APP_NAME.git
          git push --force heroku main

      - name: Run smoke tests
        env:
          HEROKU_APP_URL: ${{ secrets.HEROKU_APP_URL }}
        run: |
          sleep 5
          if [ -n "$HEROKU_APP_URL" ]; then
            curl -f "$HEROKU_APP_URL" || exit 1
          else
            echo "HEROKU_APP_URL secret not set; skipping live URL smoke test."
          fi
          echo "✅ Deployment successful!"

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()

    steps:
      - name: Notify Slack (optional)
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "RPAL IDE build failed!"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
        continue-on-error: true
