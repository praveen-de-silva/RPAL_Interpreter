apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpal-ide
  labels:
    app: rpal-ide
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rpal-ide
  template:
    metadata:
      labels:
        app: rpal-ide
    spec:
      containers:
        - name: rpal-ide
          image: yourusername/rpal-ide:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8787
          env:
            - name: RPAL_ENV
              value: "production"
            - name: RPAL_IDE_HOST
              value: "0.0.0.0"
            - name: RPAL_IDE_PORT
              value: "8787"
            - name: RPAL_TIMEOUT
              value: "30"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8787
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: rpal-ide-service
spec:
  selector:
    app: rpal-ide
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8787
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rpal-ide-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rpal-ide
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
