<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPAL Interpreter</title>
  <meta name="description" content="Write and run RPAL programs in your browser. Supports Result, AST, and ST output modes.">
</head>
<body>
<style>
  :root {
    --bg-0: #071018;
    --bg-1: #0d1621;
    --bg-2: #111c2a;
    --panel: rgba(15, 23, 36, 0.88);
    --panel-strong: rgba(19, 29, 46, 0.96);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --text: #edf4fb;
    --text-soft: #9ab0c6;
    --text-muted: #74879b;
    --accent: #8be3bc;
    --accent-2: #79d3ff;
    --danger: #ff8f8f;
    --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(121, 211, 255, 0.14), transparent 28%),
      radial-gradient(circle at top right, rgba(139, 227, 188, 0.18), transparent 30%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 58%, #070b10 100%);
  }

  .ide-root {
    width: min(1440px, calc(100% - 32px));
    margin: 16px auto;
    display: grid;
    gap: 14px;
    grid-template-rows: auto auto 1fr auto;
  }

  .hero {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 18px;
    padding: 22px 24px;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(18, 28, 43, 0.98), rgba(10, 16, 25, 0.94));
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .hero-copy {
    max-width: 840px;
  }

  .hero-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 7px 11px;
    border: 1px solid rgba(139, 227, 188, 0.22);
    border-radius: 999px;
    color: #c8f2de;
    background: rgba(139, 227, 188, 0.08);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero h1 {
    margin-bottom: 8px;
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.02;
    letter-spacing: -0.05em;
  }

  .hero p {
    max-width: 74ch;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.65;
  }

  .hero-stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 10px;
  }

  .stat-pill {
    min-width: 110px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.03);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  .stat-pill strong {
    display: block;
    font-size: 15px;
    color: var(--text);
  }

  .stat-pill span {
    display: block;
    margin-top: 4px;
    color: var(--text-muted);
    font-size: 12px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    color: var(--text-soft);
  }

  .toolbar-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }

  .toolbar-meta {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .status-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 6px rgba(139, 227, 188, 0.12);
  }

  .run-group {
    display: flex;
    align-items: stretch;
    overflow: hidden;
    border: 1px solid rgba(139, 227, 188, 0.22);
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(18, 28, 43, 0.96), rgba(10, 16, 25, 0.96));
  }

  .run-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 16px;
    border: 0;
    background: linear-gradient(180deg, rgba(139, 227, 188, 0.16), rgba(139, 227, 188, 0.08));
    color: #eefcf5;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    transition: transform 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
  }

  .play-glyph {
    width: 0;
    height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 12px solid var(--accent);
    filter: drop-shadow(0 0 8px rgba(139, 227, 188, 0.28));
    flex: 0 0 auto;
  }

  .run-btn:hover {
    filter: brightness(1.06);
    transform: translateY(-1px);
  }

  .run-btn:disabled {
    opacity: 0.55;
    cursor: wait;
    transform: none;
  }

  .mode-select-wrap {
    position: relative;
    display: flex;
    align-items: stretch;
  }

  .mode-select-wrap::after {
    content: "";
    position: absolute;
    right: 12px;
    top: 50%;
    width: 7px;
    height: 7px;
    margin-top: -6px;
    border-right: 2px solid rgba(216, 232, 247, 0.8);
    border-bottom: 2px solid rgba(216, 232, 247, 0.8);
    transform: rotate(45deg);
    pointer-events: none;
  }

  .mode-select {
    appearance: none;
    -webkit-appearance: none;
    padding: 11px 14px;
    padding-right: 32px;
    border: 0;
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(9, 15, 23, 0.98);
    color: #d8e8f7;
    min-width: 150px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }

  .mode-select option {
    background: #121b29;
    color: #f4fbff;
  }

  .workspace {
    display: grid;
    grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
    gap: 14px;
    min-height: 66vh;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: var(--panel-strong);
    box-shadow: var(--shadow);
    min-height: 0;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.02);
  }

  .panel-title {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .panel-title strong {
    font-size: 13px;
    letter-spacing: 0.11em;
    text-transform: uppercase;
  }

  .panel-title span {
    color: var(--text-muted);
    font-size: 12px;
  }

  .panel-chip {
    padding: 7px 10px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    color: var(--text-soft);
    background: rgba(255, 255, 255, 0.03);
    font-size: 12px;
  }

  .editor-wrap {
    position: relative;
    display: grid;
    grid-template-columns: 56px minmax(0, 1fr);
    flex: 1;
    min-height: 0;
  }

  .line-nums {
    padding: 16px 0;
    text-align: right;
    font-family: var(--font-mono, Consolas, monospace);
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-muted);
    user-select: none;
    pointer-events: none;
    background: rgba(255, 255, 255, 0.02);
    border-right: 1px solid var(--border);
  }

  .line-num {
    padding-right: 12px;
    display: block;
  }

  .code-area {
    width: 100%;
    min-height: 360px;
    padding: 16px 18px 16px 14px;
    border: 0;
    outline: none;
    resize: none;
    background: transparent;
    color: var(--text);
    font-family: var(--font-mono, Consolas, monospace);
    font-size: 14px;
    line-height: 1.75;
    tab-size: 2;
    caret-color: var(--accent);
  }

  .code-area::placeholder {
    color: #6f8196;
  }

  .examples-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 14px 16px 16px;
    border-top: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.015);
  }

  .ex-label {
    margin-right: 6px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .ex-btn,
  .clear-btn {
    border: 1px solid rgba(255, 255, 255, 0.09);
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .ex-btn {
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 12px;
    color: #dceaf6;
  }

  .ex-btn:hover,
  .clear-btn:hover {
    transform: translateY(-1px);
    border-color: rgba(139, 227, 188, 0.28);
    background: rgba(139, 227, 188, 0.08);
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.02);
  }

  .output-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-soft);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .clear-btn {
    padding: 8px 11px;
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-soft);
  }

  .output-box {
    flex: 1;
    min-height: 0;
    padding: 18px;
    border: 0;
    background: linear-gradient(180deg, rgba(8, 13, 20, 0.96), rgba(6, 10, 15, 0.98));
    color: var(--text);
    font-family: var(--font-mono, Consolas, monospace);
    font-size: 13px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    overflow: auto;
  }

  .output-box.empty {
    color: var(--text-muted);
    font-family: inherit;
    font-size: 13px;
    font-style: italic;
  }

  .output-box.error {
    color: #ffc0c0;
  }

  .output-box.loading {
    color: var(--text-soft);
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255, 255, 255, 0.18);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: -2px;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .credits {
    margin-top: 2px;
    padding: 0 6px;
    color: var(--text-muted);
    font-size: 11px;
    text-align: right;
    letter-spacing: 0.03em;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 0 6px;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    user-select: none;
  }
  .footer-dot { opacity: 0.4; }
  .footer-names { color: #7a9ab8; font-weight: 500; }

  /* ── Examples Drawer (mobile side menu) ───────────────────────── */
  .ex-drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4, 8, 15, 0.72);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.28s ease;
  }
  .ex-drawer-overlay.open {
    display: block;
    opacity: 1;
  }

  .ex-drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(320px, 88vw);
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(13, 22, 35, 0.98) 0%, rgba(7, 12, 20, 0.99) 100%);
    border-left: 1px solid var(--border-strong);
    box-shadow: -20px 0 60px rgba(0, 0, 0, 0.6);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .ex-drawer.open {
    transform: translateX(0);
  }

  .ex-drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    flex-shrink: 0;
  }

  .ex-drawer-title {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .ex-drawer-title strong {
    font-size: 13px;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: var(--text);
  }
  .ex-drawer-title span {
    font-size: 11px;
    color: var(--text-muted);
  }

  .ex-drawer-close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: var(--text-soft);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: background 0.15s ease, border-color 0.15s ease;
    flex-shrink: 0;
  }
  .ex-drawer-close:hover {
    background: rgba(255,255,255,0.08);
    border-color: var(--border-strong);
  }

  .ex-drawer-list {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ex-drawer-list::-webkit-scrollbar { width: 4px; }
  .ex-drawer-list::-webkit-scrollbar-track { background: transparent; }
  .ex-drawer-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

  .ex-drawer-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px 14px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: border-color 0.18s ease, background 0.18s ease, transform 0.15s ease;
  }
  .ex-drawer-item:hover {
    border-color: rgba(139, 227, 188, 0.3);
    background: rgba(139, 227, 188, 0.06);
    transform: translateY(-1px);
  }
  .ex-drawer-item:active {
    transform: translateY(0);
  }

  .ex-drawer-item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
    text-transform: capitalize;
  }

  .ex-drawer-item-preview {
    font-family: var(--font-mono, Consolas, monospace);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.55;
    white-space: pre;
    overflow: hidden;
    text-overflow: ellipsis;
    max-height: 3.5em;
  }

  /* Mobile-only trigger button inside toolbar */
  .ex-drawer-trigger {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    flex-shrink: 0;
  }
  .ex-drawer-trigger:hover {
    border-color: rgba(139, 227, 188, 0.3);
    background: rgba(139, 227, 188, 0.07);
    color: var(--accent);
  }
  .ex-drawer-trigger svg {
    flex-shrink: 0;
  }

  @media (max-width: 1100px) {
    .workspace {
      grid-template-columns: 1fr;
    }

    .code-area {
      min-height: 300px;
    }
  }

  @media (max-width: 760px) {
    .ide-root {
      width: min(100%, calc(100% - 20px));
      margin: 10px auto;
      gap: 10px;
    }

    .hero,
    .toolbar,
    .panel-header,
    .output-header,
    .examples-bar {
      padding-left: 14px;
      padding-right: 14px;
    }

    .hero {
      flex-direction: column;
      align-items: flex-start;
      padding: 16px 14px;
    }

    .hero-stats {
      width: 100%;
      justify-content: flex-start;
    }

    .stat-pill {
      flex: 1;
      min-width: 80px;
    }

    .toolbar {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 12px 14px;
    }

    .toolbar-left {
      flex-wrap: wrap;
    }

    .toolbar-meta {
      white-space: normal;
    }

    .run-group {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr;
    }

    .run-btn {
      justify-content: center;
      padding: 13px 18px;
    }

    .mode-select-wrap {
      flex: 1;
    }

    .mode-select {
      width: 100%;
      min-width: 0;
    }

    .panel-chip {
      display: none;
    }

    .editor-wrap {
      grid-template-columns: 40px minmax(0, 1fr);
    }

    .line-num {
      padding-right: 8px;
    }

    .code-area {
      min-height: 240px;
      font-size: 13px;
      padding: 14px 14px 14px 10px;
    }

    .output-box {
      font-size: 13px;
      padding: 14px;
    }

    .examples-bar {
      display: none;
    }

    .ex-drawer-trigger {
      display: flex;
    }
  }

  @media (max-width: 480px) {
    .ide-root {
      width: calc(100% - 12px);
      margin: 6px auto;
      gap: 8px;
    }

    .hero h1 {
      font-size: 22px;
    }

    .hero-stats {
      gap: 6px;
    }

    .stat-pill {
      padding: 10px 10px;
    }

    .toolbar {
      border-radius: 14px;
    }

    .panel {
      border-radius: 16px;
    }

    .editor-wrap {
      grid-template-columns: 36px minmax(0, 1fr);
    }

    .code-area {
      min-height: 200px;
      font-size: 12px;
    }

    .ex-drawer {
      width: 92vw;
    }
  }
</style>

  <div class="toolbar">
    <div class="toolbar-left">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="toolbar-title">RPAL Interpreter</span>
      <span class="toolbar-meta">Result / AST / ST</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="ex-drawer-trigger" id="exDrawerTriggerBtn" aria-label="Open examples menu" aria-expanded="false" aria-controls="exDrawer">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Examples
      </button>
      <div class="run-group">
        <button class="run-btn" id="runBtn" aria-label="Run RPAL program">
          <span class="play-glyph" aria-hidden="true"></span>
        </button>
        <div class="mode-select-wrap">
          <select class="mode-select" id="modeSelect" aria-label="Output mode">
            <option value="output">Result</option>
            <option value="ast">AST</option>
            <option value="st">ST</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <section class="workspace">
    <article class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <strong>Editor</strong>
          <span>RPAL source</span>
        </div>
        <div class="panel-chip">Tab inserts two spaces</div>
      </div>
      <div class="editor-wrap">
        <div class="line-nums" id="lineNums" aria-hidden="true"><span class="line-num">1</span></div>
        <textarea class="code-area" id="codeArea" spellcheck="false" autocomplete="off" autocorrect="off"
          autocapitalize="off" aria-label="RPAL code editor" placeholder="// Write your RPAL program here...">let f n = n * n + 1
in Print (f 5)</textarea>
      </div>
      <div class="examples-bar">
        <span class="ex-label">examples</span>
        <button class="ex-btn" data-code="Print 'Hello World'">hello world</button>
        <button class="ex-btn" data-code="let f n = n * n + 1&#10;in Print (f 5)">square+1</button>
        <button class="ex-btn"
          data-code="let rec fact n = n eq 0 -> 1 | n * fact (n-1)&#10;in Print (fact 6)">factorial</button>
        <button class="ex-btn" data-code="let Sum = fn n . n*(n+1)/2&#10;in Print (Sum 10)">sum</button>
        <button class="ex-btn" data-code="let (a,b) = (3,4)&#10;in Print (a+b)">tuple</button>
      </div>
    </article>

    <article class="panel">
      <div class="output-header">
        <div class="panel-title">
          <strong id="outputLabel">Output</strong>
          <span id="outputHint">Interpreter result</span>
        </div>
        <button class="clear-btn" id="clearBtn">Clear</button>
      </div>
      <div class="output-box empty" id="outputBox">Run a program to see the selected result here.</div>
    </article>
  </section>

  <footer class="footer" aria-label="Credits">
    <span>RPAL Interpreter</span>
    <span class="footer-dot">·</span>
    <span>Built by</span>
    <span class="footer-names">Bulagala &amp; Praveen</span>
  </footer>
</div>

<!-- Examples Side Drawer (mobile) -->
<div class="ex-drawer-overlay" id="exDrawerOverlay" aria-hidden="true"></div>
<aside class="ex-drawer" id="exDrawer" role="dialog" aria-modal="true" aria-label="Examples" hidden>
  <div class="ex-drawer-header">
    <div class="ex-drawer-title">
      <strong>Examples</strong>
      <span>Tap to load into editor</span>
    </div>
    <button class="ex-drawer-close" id="exDrawerCloseBtn" aria-label="Close examples menu">&times;</button>
  </div>
  <div class="ex-drawer-list" id="exDrawerList">
    <!-- items injected by JS -->
  </div>
</aside>

<script>
  const codeArea = document.getElementById('codeArea');
  const lineNums = document.getElementById('lineNums');
  const runBtn = document.getElementById('runBtn');
  const modeSelect = document.getElementById('modeSelect');
  const outputBox = document.getElementById('outputBox');
  const outputLabel = document.getElementById('outputLabel');
  const outputHint = document.getElementById('outputHint');
  const clearBtn = document.getElementById('clearBtn');

  const emptyMessages = {
    output: 'Run a program to see the selected result here.',
    ast: 'Run a program to see the AST here.',
    st: 'Run a program to see the ST here.'
  };

  const modeLabels = {
    output: { label: 'Output', hint: 'Interpreter result' },
    ast: { label: 'AST', hint: 'Abstract syntax tree' },
    st: { label: 'ST', hint: 'Standardized tree' }
  };

  function updateLineNums() {
    const lines = codeArea.value.split('\n').length;
    lineNums.innerHTML = Array.from({ length: lines }, (_, i) =>
      `<span class="line-num">${i + 1}</span>`).join('');
  }

  codeArea.addEventListener('input', updateLineNums);
  codeArea.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = codeArea.selectionStart, end = codeArea.selectionEnd;
      codeArea.value = codeArea.value.substring(0, s) + '  ' + codeArea.value.substring(end);
      codeArea.selectionStart = codeArea.selectionEnd = s + 2;
      updateLineNums();
    }
  });

  // ── Shared example data (single source of truth) ──────────────
  const EXAMPLES = [
    { name: 'Hello World',  code: "Print 'Hello World'" },
    { name: 'Square + 1',  code: 'let f n = n * n + 1\nin Print (f 5)' },
    { name: 'Factorial',   code: 'let rec fact n = n eq 0 -> 1 | n * fact (n-1)\nin Print (fact 6)' },
    { name: 'Sum',         code: 'let Sum = fn n . n*(n+1)/2\nin Print (Sum 10)' },
    { name: 'Tuple',       code: 'let (a,b) = (3,4)\nin Print (a+b)' },
  ];

  function loadExample(code) {
    codeArea.value = code;
    updateLineNums();
    codeArea.focus();
  }

  // Wire up desktop examples-bar buttons
  document.querySelectorAll('.ex-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      loadExample(btn.dataset.code.replace(/&#10;/g, '\n'));
    });
  });

  // ── Examples Drawer ────────────────────────────────────────────
  const exDrawerOverlay   = document.getElementById('exDrawerOverlay');
  const exDrawer          = document.getElementById('exDrawer');
  const exDrawerCloseBtn  = document.getElementById('exDrawerCloseBtn');
  const exDrawerTrigger   = document.getElementById('exDrawerTriggerBtn');
  const exDrawerList      = document.getElementById('exDrawerList');

  // Build drawer items
  EXAMPLES.forEach(({ name, code }) => {
    const btn = document.createElement('button');
    btn.className = 'ex-drawer-item';
    btn.innerHTML = `<span class="ex-drawer-item-name">${name}</span><span class="ex-drawer-item-preview">${code.replace(/</g,'&lt;')}</span>`;
    btn.addEventListener('click', () => {
      loadExample(code);
      closeDrawer();
    });
    exDrawerList.appendChild(btn);
  });

  function openDrawer() {
    exDrawer.hidden = false;
    exDrawerOverlay.style.display = 'block';
    // Force reflow so transitions play
    exDrawerOverlay.getBoundingClientRect();
    exDrawerOverlay.classList.add('open');
    exDrawer.classList.add('open');
    exDrawerTrigger.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
    exDrawerCloseBtn.focus();
  }

  function closeDrawer() {
    exDrawerOverlay.classList.remove('open');
    exDrawer.classList.remove('open');
    exDrawerTrigger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
    setTimeout(() => {
      exDrawer.hidden = true;
      exDrawerOverlay.style.display = 'none';
    }, 300);
  }

  exDrawerTrigger.addEventListener('click', openDrawer);
  exDrawerCloseBtn.addEventListener('click', closeDrawer);
  exDrawerOverlay.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  clearBtn.addEventListener('click', () => {
    const mode = modeSelect.value;
    outputBox.textContent = emptyMessages[mode] || emptyMessages.output;
    outputBox.className = 'output-box empty';
    outputLabel.textContent = modeLabels[mode]?.label || 'Output';
    outputHint.textContent = modeLabels[mode]?.hint || 'Interpreter result';
  });

  modeSelect.addEventListener('change', () => {
    const meta = modeLabels[modeSelect.value] || modeLabels.output;
    outputLabel.textContent = meta.label;
    outputHint.textContent = meta.hint;
    if (outputBox.classList.contains('empty')) {
      outputBox.textContent = emptyMessages[modeSelect.value] || emptyMessages.output;
    }
  });

  async function runRPAL() {
    const code = codeArea.value.trim();
    if (!code) return;
    const mode = modeSelect.value;

    runBtn.disabled = true;
    outputBox.className = 'output-box loading';
    outputBox.innerHTML = '<span class="spinner"></span>Running…';

    const meta = modeLabels[mode] || modeLabels.output;
    outputLabel.textContent = meta.label;
    outputHint.textContent = meta.hint;

    try {
      const resp = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, mode })
      });

      const data = await resp.json();
      if (!resp.ok || data.error) throw new Error(data.error || `Request failed with status ${resp.status}`);
      const text = (data.output || '').trim();

      outputBox.className = 'output-box';
      outputBox.textContent = text || '(no output)';
    } catch (err) {
      outputBox.className = 'output-box error';
      outputBox.textContent = 'Error: ' + err.message;
    } finally {
      runBtn.disabled = false;
    }
  }

  runBtn.addEventListener('click', runRPAL);
  codeArea.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); runRPAL(); }
  });

  updateLineNums();
</script>
</body>
</html>
